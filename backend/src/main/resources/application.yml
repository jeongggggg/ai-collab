server:
  port: 8081

spring:
  application:
    name: ai-collab-backend

  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    org.springframework.web: debug
    org.hibernate.sql: debug
    org.hibernate.type: trace